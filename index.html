<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Collaborative Document Editor</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 900px;
    height: 550px;
    background: white;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.header {
    background: #4a69bd;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.editor {
    flex: 1;
    padding: 15px;
}

textarea {
    width: 100%;
    height: 100%;
    border: none;
    outline: none;
    resize: none;
    font-size: 16px;
    line-height: 1.6;
}

.footer {
    background: #f1f1f1;
    padding: 8px;
    text-align: center;
    font-size: 13px;
    color: #555;
}
</style>

</head>

<body>

<div class="container">

    <div class="header">
        Real-Time Collaborative Document Editor
    </div>

    <div class="editor">
        <textarea id="doc" placeholder="Start typing..."></textarea>
    </div>

    <div class="footer">
        Live collaboration enabled • Auto saved to MongoDB
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const textarea = document.getElementById("doc");

socket.on("load", data => {
    textarea.value = data;
});

textarea.addEventListener("input", () => {
    socket.emit("edit", textarea.value);
});

socket.on("update", data => {
    textarea.value = data;
});
</script>

</body>
</html>
